apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cloud-app
  namespace: monitoring
  labels:
    release: kube-prometheus
spec:
  namespaceSelector:
    matchNames:
      - cloud-app
  selector:
    matchLabels:
      app: cloud-app
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s