services:

  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: cloudapp
      POSTGRES_USER: cloudapp
      POSTGRES_PASSWORD: cloudapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/cloudapp
      DB_USER: cloudapp
      DB_PASSWORD: cloudapp
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        tag: "{{.Name}}"

volumes:
  postgres_data:
